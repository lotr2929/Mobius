<!DOCTYPE html>
<html>
<head>
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
        <img src="mobius-logo.png" alt="Mobius Logo" style="height: 50px;">
        <h1 style="margin: 0;">Mobius</h1>
    </div>
    <style>
        body { font-family: Arial; padding: 40px; max-width: 600px; margin: 0 auto; }
        input { width: 100%; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; margin-top: 10px; font-size: 16px; }
        #response { margin-top: 20px; padding: 20px; background: #f0f0f0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Mobius Test</h1>
    <input id="input" type="text" placeholder="Ask something...">
    <button onclick="ask()">Ask</button>
    <div id="response"></div>
    
    <script>
        async function ask() {
            const text = document.getElementById('input').value;
            document.getElementById('response').textContent = 'Thinking...';
            
            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                document.getElementById('response').textContent = data.reply || data.error;
            } catch (err) {
                document.getElementById('response').textContent = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
