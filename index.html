<!DOCTYPE html>
<html>
<head>
    <title>Mobius</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Mobius">
    <style>
        body { 
            font-family: 'Century Gothic', 'Avenir', 'Segoe UI', 'Verdana', sans-serif; 
            padding: 40px; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        input { width: 100%; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; margin-top: 10px; font-size: 16px; }
        #response { margin-top: 20px; padding: 20px; background: #f0f0f0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <input id="input" type="text" placeholder="Ask something...">
    <button onclick="ask()">Ask</button>
    <div id="response"></div>
    
    <script>
        async function ask() {
            const text = document.getElementById('input').value;
            const responseDiv = document.getElementById('response');
            
            // Show model label and "thinking"
            responseDiv.innerHTML = '<strong>Groq (Llama 3.3 70B):</strong><br><br>Thinking...';
            
            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                
                // Convert markdown to HTML
                const htmlContent = markdownToHtml(data.reply || data.error);
                responseDiv.innerHTML = '<strong>Groq (Llama 3.3 70B)</strong><br><br>' + htmlContent;
            } catch (err) {
                responseDiv.innerHTML = '<strong>Error</strong><br><br>' + err.message;
            }
        }

        // Simple markdown to HTML converter
        function markdownToHtml(text) {
            return text
                .replace(/### (.*$)/gim, '<h3>$1</h3>')
                .replace(/## (.*$)/gim, '<h2>$1</h2>')
                .replace(/# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/```([^`]+)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</body>
</html>
