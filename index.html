<!DOCTYPE html>
<html>
<head>
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
        <img src="mobius-logo.png" alt="Mobius Logo" style="height: 50px;">
        <h1 style="margin: 0; font-size: 59px;">Mobius</h1>
    </div>
    <style>
        body { font-family: Arial; padding: 40px; max-width: 600px; margin: 0 auto; }
        input { width: 100%; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; margin-top: 10px; font-size: 16px; }
        #response { margin-top: 20px; padding: 20px; background: #f0f0f0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <input id="input" type="text" placeholder="Ask something...">
    <button onclick="ask()">Ask</button>
    <div id="response"></div>
    
    <script>
        async function ask() {
            const text = document.getElementById('input').value;
            const responseDiv = document.getElementById('response');
            
            // Show model label and "thinking"
            responseDiv.innerHTML = '<strong>Groq (Llama 3.3 70B)</strong><br><br>Thinking...';
            
            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                
                // Convert markdown to HTML
                const htmlContent = markdownToHtml(data.reply || data.error);
                responseDiv.innerHTML = '<strong>Groq (Llama 3.3 70B)</strong><br><br>' + htmlContent;
            } catch (err) {
                responseDiv.innerHTML = '<strong>Error</strong><br><br>' + err.message;
            }
        }

        // Simple markdown to HTML converter
        function markdownToHtml(text) {
            return text
                .replace(/### (.*$)/gim, '<h3>$1</h3>')
                .replace(/## (.*$)/gim, '<h2>$1</h2>')
                .replace(/# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/```([^`]+)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
