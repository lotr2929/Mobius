<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Mobius</title>
    <link rel="icon" type="image/png" href="mobius-logo.png">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8d7c64">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Mobius">
    <style>
        body { 
            font-family: 'Century Gothic', 'Avenir', 'Segoe UI', 'Verdana', sans-serif; 
            padding: 20px; 
            max-width: 700px; 
            margin: 0 auto;
            background: #e2dccd;
        }
        textarea { 
            width: 100%; 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #8d7c64;
            border-radius: 1px;
            box-sizing: border-box;
            font-family: 'Century Gothic', 'Avenir', 'Segoe UI', 'Verdana', sans-serif;
            resize: vertical;
            min-height: 60px;
            background: #f5eedd;
        }
        .controls {
            display: flex;
            gap: 8px;
            margin-top: 2px;
            align-items: center;
        }
        button { 
            padding: 2px 10px;
            height: 32px;
            font-size: 16px;
            background: #8d7c64;
            color: white;
            border: none;
            border-radius: 1px;
            cursor: pointer;
        }
        button:hover { background: #574d3e; }
        button:disabled { background: #b8a898; cursor: not-allowed; }

        /* + upload button */
        #uploadBtn {
            width: 32px;
            height: 32px;
            padding: 0;
            font-size: 20px;
            line-height: 1;
            background: #8d7c64;
            flex-shrink: 0;
        }
        #uploadBtn:hover { background: #574d3e; }

        /* File chips */
        #fileChips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .file-chip {
            background: #d4c9b5;
            border: 1px solid #8d7c64;
            border-radius: 2px;
            padding: 2px 8px;
            font-size: 12px;
            color: #3a2e22;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .file-chip-remove {
            cursor: pointer;
            color: #8d7c64;
            font-weight: bold;
            font-size: 14px;
            line-height: 1;
        }
        .file-chip-remove:hover { color: #3a2e22; }

        #chatPanel { 
            margin-top: 4px; 
            padding: 16px; 
            background: #e2dccd;
            border: none;
            border-radius: 1px;
            box-shadow: none;
            max-height: 520px;
            overflow-y: auto;
        }
        .chat-entry { margin-bottom: 16px; }
        .chat-query {
            color: #4a3728;
            font-weight: bold;
            margin-bottom: 4px;
            white-space: pre-wrap;
        }
        .chat-answer { color: #2a2a2a; white-space: pre-wrap; }
        .chat-label { font-size: 13px; color: #8d7c64; margin-bottom: 2px; }
        .chat-divider {
            border: none;
            border-top: 1px solid #c9bfae;
            margin: 12px 0;
        }
        .thinking { color: #8d7c64; font-style: italic; }

        /* mobius_query display */
        .mq-block {
            background: #ede5d4;
            border: 1px dashed #8d7c64;
            border-radius: 1px;
            padding: 10px 14px;
            font-size: 13px;
            font-family: monospace;
            white-space: pre-wrap;
            color: #3a2e22;
            margin-top: 6px;
        }
        .mq-label {
            font-size: 12px;
            color: #a08060;
            margin-bottom: 4px;
            font-family: 'Century Gothic', 'Avenir', 'Segoe UI', 'Verdana', sans-serif;
        }

        /* ── Chat History List ── */
        .chat-history-list {
            margin-top: 4px;
        }
        .chat-history-item {
            padding: 8px 10px;
            background: #ede5d4;
            border: 1px solid #c9bfae;
            border-radius: 1px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
        }
        .chat-history-item:hover { background: #d9cfbc; }
        .chi-title {
            font-weight: bold;
            color: #3a2e22;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chi-meta {
            font-size: 11px;
            color: #8d7c64;
            margin-top: 2px;
        }

        /* ── Context Menu ── */
        #contextMenu {
            position: fixed;
            background: #f5eedd;
            border: 1px solid #8d7c64;
            border-radius: 2px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.15);
            z-index: 9999;
            min-width: 180px;
            display: none;
        }
        .ctx-item {
            padding: 8px 14px;
            font-size: 14px;
            color: #3a2e22;
            cursor: pointer;
            font-family: 'Century Gothic', 'Avenir', 'Segoe UI', 'Verdana', sans-serif;
        }
        .ctx-item:hover { background: #d9cfbc; }

        /* ── Image preview thumbnails ── */
        .img-thumb {
            max-width: 100%;
            max-height: 180px;
            border: 1px solid #c9bfae;
            margin-top: 6px;
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 1px;">
        <img src="mobius-logo.png" alt="Mobius Logo" style="height: 45px;">
        <h1 style="margin: 0; font-size: 25px;">Mobius</h1>
        <span id="userLabel" style="margin-left: auto; font-size: 14px; color: #4a3728;"></span>
    </div>
    
    <textarea id="input" placeholder="Ask something..." rows="3"></textarea>
    <div id="fileChips"></div>
    <div class="controls">
        <button id="uploadBtn" title="Attach file" onclick="document.getElementById('fileInput').click()">+</button>
        <input type="file" id="fileInput" style="display:none" multiple accept="image/*,.pdf,.txt,.md,.csv,.js,.py,.html,.json" onchange="handleFileSelect(this)">
        <button id="askBtn" onclick="handleAsk()" style="width:80px;">Ask</button>
        <div style="display:flex; flex-direction:column; gap:0px; margin-left:2px;">
            <button onclick="navigateChat(-1)" title="Previous query" style="height:15px; width:24px; padding:0; font-size:10px; line-height:1; background:#8d7c64;">&#9650;</button>
            <button onclick="navigateChat(1)" title="Next query" style="height:15px; width:24px; padding:0; font-size:10px; line-height:1; background:#8d7c64;">&#9660;</button>
        </div>
        <input id="chatSearch" type="text" placeholder="Search..." oninput="searchChat(this.value)" style="height:32px; padding:0 8px; font-size:14px; border:1px solid #8d7c64; background:#f5eedd; color:#4a3728; border-radius:1px; flex:1; margin-left:2px;">
    </div>
    <div id="chatPanel"></div>

    <!-- Context menu -->
    <div id="contextMenu">
        <div class="ctx-item" onclick="ctxAction('load')">📂 Open chat</div>
        <div class="ctx-item" onclick="ctxAction('copy-summary')">📋 Copy summary</div>
        <div class="ctx-item" onclick="ctxAction('copy-full')">📄 Copy full chat</div>
        <div class="ctx-item" onclick="ctxAction('paste-context')">💬 Paste as context</div>
    </div>
    
    <script>
        if (!localStorage.getItem('mobius_user_id')) {
            window.location.href = '/login';
        } else {
            const username = localStorage.getItem('mobius_username');
            document.getElementById('userLabel').textContent = 'User: ' + username;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('input');
            textarea.addEventListener('input', () => {
                textarea.style.height = 'auto';
                textarea.style.height = textarea.scrollHeight + 'px';
            });
            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) handleAsk();
            });
        });

        // Close context menu on outside click
        document.addEventListener('click', () => hideContextMenu());

        // In-memory chat history for the session
        let chatHistory = [];

        // Pending mobius_query waiting for user confirmation
        let pendingMobiusQuery = null;

        // Attached files (uploaded)
        let attachedFiles = [];

        // Context menu state
        let ctxSession = null;

        // Environment context payload (loaded once on startup)
        let mobiusContext = null;
        buildContextPayload().then(ctx => { mobiusContext = ctx; });

        const modelLabels = {
            groq: 'Groq',
            gemini: 'Gemini',
            websearch: 'Groq+Tavily',
            system: 'System'
        };

        function scrollToBottom() {
            const panel = document.getElementById('chatPanel');
            panel.scrollTop = panel.scrollHeight;
        }

        function addDivider() {
            const panel = document.getElementById('chatPanel');
            if (panel.children.length > 0) {
                const hr = document.createElement('hr');
                hr.className = 'chat-divider';
                panel.appendChild(hr);
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function markdownToHtml(text) {
            return text
                .replace(/### (.*$)/gim, '<h3>$1</h3>')
                .replace(/## (.*$)/gim, '<h2>$1</h2>')
                .replace(/# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/```([^`]+)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        function formatMobiusQuery(mq) {
            const display = {
                ASK: mq.ASK,
                INSTRUCTIONS: mq.INSTRUCTIONS.length > 0
                    ? `[${mq.INSTRUCTIONS.length} message(s) of chat history]`
                    : '[]',
                QUERY: mq.QUERY,
                FILES: mq.FILES.length > 0 ? mq.FILES.map(f => f.name) : []
            };
            return JSON.stringify(display, null, 2);
        }

        // ── File handling ─────────────────────────────────────────────────────

        async function handleFileSelect(input) {
            const files = Array.from(input.files);
            for (const file of files) {
                const fd = new FormData();
                fd.append('file', file);
                try {
                    const res = await fetch('/upload', { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.error) { alert('Upload error: ' + data.error); continue; }
                    attachedFiles.push(data);
                    addFileChip(data);
                } catch (err) {
                    alert('Upload failed: ' + err.message);
                }
            }
            input.value = '';
        }

        function addFileChip(fileData) {
            const chips = document.getElementById('fileChips');
            const chip = document.createElement('div');
            chip.className = 'file-chip';
            chip.dataset.name = fileData.name;
            chip.innerHTML = `<span>${escapeHtml(fileData.name)}</span><span class="file-chip-remove" onclick="removeFile('${escapeHtml(fileData.name)}', this)">✕</span>`;
            chips.appendChild(chip);
        }

        function removeFile(name, el) {
            attachedFiles = attachedFiles.filter(f => f.name !== name);
            el.closest('.file-chip').remove();
        }

        // ── Context Menu ──────────────────────────────────────────────────────

        function showContextMenu(e, session) {
            e.preventDefault();
            ctxSession = session;
            const menu = document.getElementById('contextMenu');
            menu.style.display = 'block';
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
        }

        function hideContextMenu() {
            document.getElementById('contextMenu').style.display = 'none';
        }

        async function ctxAction(action) {
            hideContextMenu();
            if (!ctxSession) return;
            if (action === 'load') {
                loadSessionIntoChat(ctxSession);
            } else if (action === 'copy-summary') {
                const summary = buildSummary(ctxSession);
                navigator.clipboard.writeText(summary).then(() => alert('Summary copied!'));
            } else if (action === 'copy-full') {
                const full = buildFullText(ctxSession);
                navigator.clipboard.writeText(full).then(() => alert('Full chat copied!'));
            } else if (action === 'paste-context') {
                const summary = buildSummary(ctxSession);
                const filename = 'context-' + new Date(ctxSession.started_at).toISOString().slice(0,10) + '.txt';
                const blob = new Blob([summary], { type: 'text/plain' });
                const file = new File([blob], filename, { type: 'text/plain' });
                const fd = new FormData();
                fd.append('file', file);
                try {
                    const res = await fetch('/upload', { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.error) { alert('Error: ' + data.error); return; }
                    attachedFiles.push(data);
                    addFileChip(data);
                } catch (err) {
                    alert('Failed to attach context: ' + err.message);
                }
            }
        }

        function buildSummary(session) {
            const date = new Date(session.started_at).toLocaleString();
            let text = `Chat from ${date}\n`;
            text += `Topic: ${session.title}\n\n`;
            // First 3 exchanges as summary
            const preview = session.messages.slice(0, 3);
            for (const m of preview) {
                text += `Q: ${m.question}\nA: ${m.answer}\n\n`;
            }
            if (session.messages.length > 3) text += `[...${session.messages.length - 3} more exchanges]`;
            return text.trim();
        }

        function buildFullText(session) {
            const date = new Date(session.started_at).toLocaleString();
            let text = `Chat from ${date}\n${'─'.repeat(40)}\n\n`;
            for (const m of session.messages) {
                text += `Q: ${m.question}\nA: ${m.answer}\n\n`;
            }
            return text.trim();
        }

        function loadSessionIntoChat(session) {
            const panel = document.getElementById('chatPanel');
            // Clear panel and chatHistory for this loaded session
            panel.innerHTML = '';
            chatHistory = [];

            const header = document.createElement('div');
            header.style.cssText = 'font-size:12px;color:#8d7c64;margin-bottom:12px;font-style:italic;';
            header.textContent = `📂 Loaded chat from ${new Date(session.started_at).toLocaleString()}`;
            panel.appendChild(header);

            for (const m of session.messages) {
                addDivider();
                const entry = document.createElement('div');
                entry.className = 'chat-entry';
                const modelLabel = modelLabels[m.model] || m.model;
                entry.innerHTML = `
                    <div class="chat-query">Q: ${escapeHtml(m.question)}</div>
                    <div class="chat-label">A:(${escapeHtml(modelLabel)})</div>
                    <div class="chat-answer">${markdownToHtml(m.answer)}</div>
                `;
                panel.appendChild(entry);
                chatHistory.push({ role: 'user', content: m.question });
                chatHistory.push({ role: 'assistant', content: m.answer });
            }
            scrollToBottom();
        }

        // ── Render chat history list ──────────────────────────────────────────

        function renderChatHistoryList(sessions) {
            const panel = document.getElementById('chatPanel');
            addDivider();

            const wrapper = document.createElement('div');
            wrapper.innerHTML = `<div class="chat-label" style="margin-bottom:8px;">📋 Chat History (${sessions.length} sessions) — click to open, right-click for options</div>`;

            const list = document.createElement('div');
            list.className = 'chat-history-list';

            for (const session of sessions) {
                const item = document.createElement('div');
                item.className = 'chat-history-item';
                const date = new Date(session.started_at).toLocaleString();
                const count = session.messages.length;
                item.innerHTML = `
                    <div class="chi-title">${escapeHtml(session.title)}</div>
                    <div class="chi-meta">${date} · ${count} exchange${count !== 1 ? 's' : ''}</div>
                `;
                item.addEventListener('click', () => loadSessionIntoChat(session));
                item.addEventListener('contextmenu', (e) => showContextMenu(e, session));
                list.appendChild(item);
            }

            wrapper.appendChild(list);
            panel.appendChild(wrapper);
            scrollToBottom();
        }

        // ── Main handler ──────────────────────────────────────────────────────

        async function handleAsk() {
            const userId = localStorage.getItem('mobius_user_id');
            if (!userId) { window.location.href = '/login'; return; }

            if (pendingMobiusQuery) {
                await executeQuery(userId);
            } else {
                await parseQuery(userId);
            }
        }

        async function parseQuery(userId) {
            const text = document.getElementById('input').value.trim();
            if (!text) return;

            const model = 'groq';
            const panel = document.getElementById('chatPanel');

            addDivider();

            const entry = document.createElement('div');
            entry.className = 'chat-entry';
            entry.innerHTML = `
                <div class="chat-query">Q: ${escapeHtml(text)}</div>
                <div class="mq-label">▸ Mobius Query (press Ask to send)</div>
            `;
            const mqPreview = document.createElement('div');
            mqPreview.className = 'mq-block';
            mqPreview.textContent = 'Building...';
            entry.appendChild(mqPreview);

            // Show image previews if any images attached
            for (const f of attachedFiles) {
                if (f.mimeType && f.mimeType.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.className = 'img-thumb';
                    img.src = `data:${f.mimeType};base64,${f.base64}`;
                    entry.appendChild(img);
                }
            }

            panel.appendChild(entry);
            scrollToBottom();

            try {
                const res = await fetch('/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, model, history: chatHistory, context: mobiusContext })
                });
                const data = await res.json();
                pendingMobiusQuery = data.mobius_query;
                // Attach files to the query
                pendingMobiusQuery.FILES = [...attachedFiles];

                // Auto-route to Gemini if images attached
                if (attachedFiles.some(f => f.mimeType && f.mimeType.startsWith('image/'))) {
                    pendingMobiusQuery.ASK = 'gemini';
                }

                mqPreview.textContent = formatMobiusQuery(pendingMobiusQuery);
                scrollToBottom();
            } catch (err) {
                mqPreview.textContent = 'Error: ' + err.message;
                pendingMobiusQuery = null;
            }
        }

        async function executeQuery(userId) {
            const panel = document.getElementById('chatPanel');
            const model = pendingMobiusQuery.ASK;

            // Handle chat history specially — no AI call needed
            if (model === 'chat_history') {
                pendingMobiusQuery = null;
                // Clear chips
                attachedFiles = [];
                document.getElementById('fileChips').innerHTML = '';
                document.getElementById('input').value = '';
                try {
                    const res = await fetch('/api/chat-history?userId=' + localStorage.getItem('mobius_user_id'));
                    const data = await res.json();
                    renderChatHistoryList(data.sessions || []);
                } catch (err) {
                    alert('Error loading chat history: ' + err.message);
                }
                return;
            }

            const modelLabel = modelLabels[model] || model;

            const answerWrapper = document.createElement('div');
            const answerLabel = document.createElement('div');
            answerLabel.className = 'chat-label';
            answerLabel.textContent = `A:(${modelLabel})`;
            const answerDiv = document.createElement('div');
            answerDiv.className = 'chat-answer thinking';
            answerDiv.textContent = 'Thinking...';
            answerWrapper.appendChild(answerLabel);
            answerWrapper.appendChild(answerDiv);
            panel.appendChild(answerWrapper);
            scrollToBottom();

            const mq = pendingMobiusQuery;
            pendingMobiusQuery = null;

            // Clear attached files
            attachedFiles = [];
            document.getElementById('fileChips').innerHTML = '';

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobius_query: mq, userId })
                });
                const data = await res.json();
                const reply = data.reply || data.error;
                const usedModel = data.modelUsed || model;

                answerDiv.className = 'chat-answer';
                answerDiv.innerHTML = markdownToHtml(reply);
                answerLabel.textContent = `A:(${modelLabels[usedModel] || usedModel})`;

                chatHistory.push({ role: 'user', content: mq.QUERY });
                chatHistory.push({ role: 'assistant', content: reply });

                document.getElementById('input').value = '';
                scrollToBottom();
            } catch (err) {
                answerDiv.className = 'chat-answer';
                answerDiv.textContent = 'Error: ' + err.message;
            }
        }

        // ── Chat navigation & search ──────────────────────────────────────────
        let currentNavIndex = -1;

        function getQueryEntries() {
            return Array.from(document.querySelectorAll('.chat-query'));
        }

        function navigateChat(direction) {
            const entries = getQueryEntries();
            if (entries.length === 0) return;
            currentNavIndex = Math.max(0, Math.min(entries.length - 1, currentNavIndex + direction));
            entries[currentNavIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function searchChat(term) {
            const panel = document.getElementById('chatPanel');
            panel.querySelectorAll('mark').forEach(m => {
                m.replaceWith(document.createTextNode(m.textContent));
            });
            panel.normalize();
            if (!term.trim()) return;

            const walker = document.createTreeWalker(panel, NodeFilter.SHOW_TEXT);
            const matches = [];
            let node;
            while (node = walker.nextNode()) {
                if (node.textContent.toLowerCase().includes(term.toLowerCase())) {
                    matches.push(node);
                }
            }
            matches.forEach(node => {
                const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                const span = document.createElement('span');
                span.innerHTML = node.textContent.replace(regex, '<mark style="background:#c8b89a;color:#2a2a2a;">$1</mark>');
                node.replaceWith(span);
            });

            const first = panel.querySelector('mark');
            if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Auto-connect Google
        async function autoConnectGoogle() {
            const userId = localStorage.getItem('mobius_user_id');
            if (!userId) return;
            try {
                const res = await fetch('/auth/google/status?userId=' + userId);
                const data = await res.json();
                if (!data.connected) {
                    window.location.href = '/auth/google?userId=' + userId;
                }
            } catch (e) {}
        }

        autoConnectGoogle();

        if (window.location.search.includes('google=connected')) {
            history.replaceState({}, '', '/');
        }

    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js');
        }
    </script>
</body>
</html>
